# =============================================================================
# THÔNG TIN DỰ ÁN (PROJECT METADATA)
# =============================================================================
# 1. Dự án này làm gì:
#    - Ứng dụng di động bán đồ điện tử (Electronics App). Cho phép người dùng tìm kiếm,
#      xem danh mục sản phẩm, quản lý giỏ hàng và đặt mua đồ điện tử.
#
# 2. Cấu trúc thư mục chính:
#    - Thiết kế theo cấu trúc Feature-First Clean Architecture:
#      lib/features/
#      ├── auth/          # Tính năng xác thực & tài khoản người dùng
#      ├── home/          # Trang chủ chính của ứng dụng đồ điện tử
#      └── [feature_name]/ # Các tính năng khác (ví dụ: cart, checkout, rating_review)
#          ├── data/      # Nguồn dữ liệu (Mock, API), DTO Models, Repository Impl
#          ├── domain/    # Core logic (Entities, Repository Interface, UseCases)
#          └── presentation/ # Widgets UI và State Notifiers (Riverpod)
#
# 3. Tech Stack đang dùng:
#    - Flutter SDK & Dart Language
#    - flutter_riverpod (Quản lý trạng thái & Dependency Injection)
#    - freezed & freezed_annotation (Tạo code cho các model/state bất biến)
#    - json_serializable & json_annotation (Tự động sinh code chuyển đổi JSON)
#    - fpdart (Xử lý kết quả dạng Either cho lập trình hàm)
#    - dio (Thư viện gọi API HTTP)
#
# 4. Luồng xử lý quan trọng:
#    - Khi khởi chạy: Giao diện chính watch các Riverpod AutoDisposeNotifierProvider.
#    - Khi người dùng tương tác: UI gọi các phương thức trong Notifier -> Notifier
#      gọi UseCase tương ứng -> UseCase xử lý logic -> trả về Either ->
#      cập nhật State -> UI tự động rebuild.
#
# 5. Quy ước code, naming, database:
#    - Tính độc lập: Tầng Domain tuyệt đối không phụ thuộc hay import mã nguồn Flutter, Riverpod, hay Data.
#    - Dependency Injection: Inject dependencies hoàn toàn bằng Riverpod Providers.
#    - Bất biến (Immutability): Mọi Model dữ liệu và UI State phải dùng Freezed.
#    - Naming conventions: Tên file dùng snake_case, Class dùng PascalCase, Provider dùng camelCase có hậu tố `Provider`.
#
# 6. Các tính năng chính của ứng dụng:
#    * Role Admin:
#      - Admin có thể Thêm, Sửa, Xóa, Tìm kiếm, Hiển thị danh sách các thể loại (category).
#      - Admin có thể Thêm, Sửa, Xóa, Tìm kiếm, Hiển thị danh sách các sản phẩm đồ điện tử.
#      - Admin có thể cập nhật trạng thái Order, hiển thị danh sách Orders của tất cả các users với 2 tab riêng biệt: Đang xử lý và Đã hoàn thành.
#      - Admin có thể thực hiện phân quyền admin cho các tài khoản khác.
#      - Admin có theo dõi doanh thu bán hàng theo thời gian.
#      - Admin có theo dõi danh sách các sản phẩm bán chạy nhất theo thời gian.
#      - Admin có thể Thêm, Sửa, Xóa, Hiển thị danh sách các chương trình khuyến mại để kích cầu người mua.
#      - Admin có thể theo dõi danh sách phản hồi, đóng góp ý kiến của tất cả các users về ứng dụng.
#
#    * Role Users:
#      - Module user bao gồm các tính năng: đăng nhập, đăng ký, quên mật khẩu, đổi mật khẩu, hiển thị user profile, đăng xuất.
#      - Tính năng tìm kiếm sản phẩm theo tên (nhập keyword).
#      - Tính năng Slide Image: hiển thị những sản phẩm nổi bật, cứ sau 3s tự động chuyển slide một lần.
#      - Hiển thị danh sách sản phẩm hoàn toàn realtime từ Firebase Database. Các sản phẩm được phân chia theo từng thể loại khác nhau: Cảm biến, Đèn LED, Mạch điện… Mỗi một thể loại tương ứng với 1 Tab riêng biệt.
#      - Tính năng lọc sản phẩm theo những tiêu chí khác nhau: lọc theo xếp hạng, lọc theo giá, lọc theo chương trình khuyến mại…
#      - Hiển thị chi tiết thông tin của sản phẩm (Detail): ảnh, tên, miêu tả, thông số kỹ thuật của sản phẩm…
#      - Tính năng Xếp hạng và đánh giá sản phẩm (Rating & Review).
#      - Tính năng giỏ hàng: Thêm sản phẩm vào giỏ hàng, chỉnh sửa số lượng trong giỏ hàng, xóa sản phẩm khỏi giỏ hàng.
#      - Tính năng chọn Phương thức thanh toán, chọn Địa chỉ giao hàng, áp dụng Chương trình khuyến mại.
#      - Tính năng đặt hàng, quản lý lịch sử đặt hàng theo trạng thái: Đang xử lý, Đã hoàn thành.
#      - Tính năng theo dõi đơn hàng theo các bước: Quán nhận được đơn hàng, chuẩn bị đơn hàng, giao hàng cho khách.
#      - Tính năng xếp hạng và đánh giá quá trình giao hàng.
#      - Tính năng Feedback: gửi phản hồi, đóng góp ý kiến hoặc đánh giá ứng dụng.
# =============================================================================

